services:
  db:
    image: postgres:16
    container_name: fishing-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fishing_db
    ports:
      - "5432:5432"
    volumes:
      - fishing_postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: fishing-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - db

volumes:
  fishing_postgres_data: